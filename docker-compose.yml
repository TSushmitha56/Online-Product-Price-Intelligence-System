services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: priceintel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-priceintel}
      POSTGRES_USER: ${POSTGRES_USER:-priceintel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priceintel_user} -d ${POSTGRES_DB:-priceintel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: priceintel_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: priceintel_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      # Override specific values for Docker networking
      DATABASE_URL: postgres://${POSTGRES_USER:-priceintel_user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-priceintel}
      REDIS_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations before starting gunicorn
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --timeout 120
             --access-logfile -
             --error-logfile -"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── React/Vite Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: priceintel_frontend
    restart: unless-stopped
    networks:
      - frontend_net
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: priceintel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # Mount SSL certs here
      - backend_media:/var/www/media:ro      # Serve media files directly
      - backend_static:/var/www/static:ro    # Serve static files directly
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_media:
    driver: local
  backend_static:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
